Section "Device"
    Identifier  "GPU1"
    Driver      "nvidia"
    BusID       "PCI:97:0:0"
    Option      "AllowEmptyInitialConfiguration" "True"
EndSection
Section "Monitor"
    Identifier  "Monitor1"
    HorizSync   28.0-80.0
    VertRefresh 48.0-75.0
    Modeline    "1920x1080" 172.80 1920 2040 2248 2576 1080 1081 1084 1118
EndSection
Section "Screen"
    Identifier  "Screen1"
    Device      "GPU1"
    Monitor     "Monitor1"
    DefaultDepth 24
    SubSection  "Display"
        Depth   24
        Modes   "1920x1080"
        Virtual 1920 1080
    EndSubSection
EndSection
Section "ServerLayout"
    Identifier "Layout1"
    Screen 0 "Screen1"
EndSection
