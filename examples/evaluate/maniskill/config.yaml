defaults:
  - ../../../vagen/configs/eval_default

# Before running eval, start the ManiSkill server:
#   python -m vagen.envs.maniskill.serve --port 8003

fileroot: ${oc.env:HOME}/projects/vagen

envs:
  - name: RemoteEnv
    n_envs: 50
    tag_id: maniskill_align
    seed: [0, 50, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8003"
      timeout: 120
      retries: 3
      env_id: AlignTwoCube
      prompt_format: free_think
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

  - name: RemoteEnv
    n_envs: 50
    tag_id: maniskill_place
    seed: [0, 50, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8003"
      timeout: 120
      retries: 3
      env_id: PlaceTwoCube
      prompt_format: free_think
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

  - name: RemoteEnv
    n_envs: 50
    tag_id: maniskill_stack
    seed: [0, 50, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8003"
      timeout: 120
      retries: 3
      env_id: StackThreeCube
      prompt_format: free_think
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ${fileroot}/rollouts/eval_maniskill
  default_max_turns: 5

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 16
  resume: skip_completed
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: ""
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  openai:
    api_key: ""
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 8
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
