defaults:
  - ../../../vagen/configs/eval_default

fileroot: ${oc.env:HOME}/projects/vagen/VAGEN

envs:
  - name: SpatialGym
    n_envs: 20
    tag_id: spatial_gym_1room
    seed: [0, 19, 1]
    max_turns: 11
    config:
      exp_type: active
      render_mode: vision
      max_exp_steps: 10
      data_dir: ../../../vagen/envs/spatial_gym/room_data/1-room
      eval_tasks:
        - task_type: rot
          task_kwargs: {}
      prompt_config:
        enable_think: true
    chat_config:
      temperature: 0.0
      max_tokens: 32768
      top_p: 1.0

experiment:
  dump_dir: ./rollouts/spatial_gym_1room
  default_max_turns: 11

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 3
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ""               # or export OPENAI_API_KEY
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 3
    max_retries: 6
    min_backoff: 1.0
    max_backoff: 16.0
