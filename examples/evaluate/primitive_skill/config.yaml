defaults:
  - ../../../vagen/configs/eval_default

# Before running eval, start the primitive_skill server:
#   python -m vagen.envs.primitive_skill.serve --port 8000

fileroot: ${oc.env:HOME}/projects/vagen

envs:
  - name: RemoteEnv
    n_envs: 16
    tag_id: primitive_skill_align_two_cube
    seed: [0, 16, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 6
      env_id: AlignTwoCube
      prompt_format: wm
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

  - name: RemoteEnv
    n_envs: 16
    tag_id: primitive_skill_place_two_cube
    seed: [0, 16, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 6
      env_id: PlaceTwoCube
      prompt_format: wm
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

  - name: RemoteEnv
    n_envs: 16
    tag_id: primitive_skill_stack_three_cube
    seed: [0, 16, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 6
      env_id: StackThreeCube
      prompt_format: wm
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

  - name: RemoteEnv
    n_envs: 16
    tag_id: primitive_skill_put_apple_in_drawer
    seed: [0, 16, 1]
    max_turns: 5
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 6
      env_id: PutAppleInDrawer
      prompt_format: wm
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
    chat_config:
      temperature: 0
      max_tokens: 1024
      top_p: 1.0

experiment:
  dump_dir: ${fileroot}/rollouts/eval_primitive_skill
  default_max_turns: 5

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 16
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ""               # or export OPENAI_API_KEY
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 8
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
