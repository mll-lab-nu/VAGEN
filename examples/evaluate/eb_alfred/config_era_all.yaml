experiment:
  dump_dir: ${fileroot}/rollouts/eval_eb_alfred_era
  default_max_turns: 30

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 1
  resume: skip_completed
  live_summary: true

backends:
  openai:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: "EPL-Only-Model_EB-Alfred"
    max_concurrency: 1
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
