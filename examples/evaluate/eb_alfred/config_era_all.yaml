fileroot: ${oc.env:HOME}/workspace/Yaning/VAGEN

envs:
  - name: RemoteEnv
    n_envs: 51
    data_source: eb_alfred
    tag_id: eb_alfred_eval_era_base
    seed: [0, 51, 1]
    max_turns: 30
    concat_multi_turn: false
    config:
      base_urls:
        - "http://localhost:8000"
      timeout: 600
      eval_set: base
      obs_image_size: 500
      max_turns: 30
      max_actions_per_step: 20
      max_env_steps: 30
      action_sep: "|"
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0
    chat_config:
      temperature: 0
      max_tokens: 2048
      top_p: 1.0
      stop: ["<|diff_marker|>"]

