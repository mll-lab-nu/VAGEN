defaults:
  - ../../../vagen/configs/eval_default

# Before running eval, start the SVG server:
#   python -m vagen.envs.svg.serve --port 8002

fileroot: ${oc.env:HOME}/projects/vagen

envs:
  - name: RemoteEnv
    n_envs: 100
    tag_id: svg
    seed: [0, 100, 1]
    max_turns: 3
    config:
      base_urls: "http://localhost:8002"
      timeout: 120
      retries: 3
      prompt_format: free_think
      max_actions_per_step: 1
      action_sep: "~~"
      format_reward: 0.5
      format_penalty: 0.0
      dino_weight: 5.0
      structural_weight: 10.0
      dreamsim_weight: 0.0
    chat_config:
      temperature: 0
      max_tokens: 2048
      top_p: 1.0

experiment:
  dump_dir: ${fileroot}/rollouts/eval_svg
  default_max_turns: 3

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 16
  resume: skip_completed
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: ""
    max_concurrency: 2
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0

  openai:
    api_key: ""               # or export OPENAI_API_KEY
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 8
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
