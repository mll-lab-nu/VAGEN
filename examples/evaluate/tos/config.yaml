envs:
  - name: SpatialGym
    n_envs: 5
    tag_id: tos_2room
    seed_list: [0, 1, 2, 3, 4]
    max_turns: 15
    config:
      exp_type: active
      render_mode: vision
      max_exp_steps: 15
      data_dir: ../../../vagen/envs/tos/room_data/2-room
      eval_tasks:
        - task_type: rot
          task_kwargs: {}
      prompt_config:
        enable_think: true
    chat_config:
      temperature: 0.0
      max_tokens: 2048
      top_p: 1.0

experiment:
  dump_dir: ./rollouts/tos_2room
  default_max_turns: 15

run:
  backend: openai
  base_seed: 0
  max_concurrent_jobs: 3
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ""
    base_url: null
    model: "gpt-4.1-mini"
    max_concurrency: 3
    max_retries: 6
    min_backoff: 1.0
    max_backoff: 16.0

  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: "Qwen/Qwen2.5-VL-7B-Instruct"
    max_concurrency: 3
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
