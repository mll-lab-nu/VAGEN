envs:
  - name: RemoteEnv
    n_envs: 50
    data_source: maniskill
    seed: [5000, 5050, 1]
    max_turns: 5
    response_length_per_turn: 1024
    config:
      base_urls: "http://localhost:8003"
      timeout: 120
      retries: 3
      env_id: AlignTwoCube
      prompt_format: free_think
      max_actions_per_step: 2
      action_sep: "|"
      render_mode: vision
      format_reward: 0.1
      success_reward: 10.0
