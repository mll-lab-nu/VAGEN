envs:
  - name: RemoteEnv
    n_envs: 10
    data_source: eb_alfred
    tag_id: eb_alfred_val_common
    seed: [0, 50, 1]
    max_turns: 20
    response_length_per_turn: 2048
    config:
      base_urls:
        - "http://localhost:8000"
      timeout: 600
      eval_set: common_sense
      obs_image_size: 500
      max_turns: 20
      max_actions_per_step: 20
      max_env_steps: 30
      action_sep: "|"
      prompt_format: free_think
      use_example_in_sys_prompt: true
      format_reward: 0.1
      success_reward: 1.0

