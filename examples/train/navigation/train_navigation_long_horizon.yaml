envs:
  - name: RemoteEnv
    n_envs: 1200
    data_source: navigation_long_horizon
    seed: [1, 1200, 1]
    max_turns: 10
    response_length_per_turn: 512
    config:
      base_urls: "http://localhost:8000"
      timeout: 120
      retries: 6
      eval_set: long_horizon_train
      prompt_format: eval_mode
      max_actions_per_step: 5
