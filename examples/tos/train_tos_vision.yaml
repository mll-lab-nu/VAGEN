envs:
  - name: SpatialGym          # registered env name in env_registry.yaml
    n_envs: 5000
    data_source: tos           # nickname for logging
    seed: [1, 5000, 1]         # sample n_envs seeds from seed[0] to seed[1], each used at most seed[2] times
    max_turns: 16              # max interaction turns (15 explore steps + 1 cogmap turn)
    response_length_per_turn: 1024
    config:
      exp_type: active
      render_mode: vision
      max_exp_steps: 15
      data_dir: vagen/envs/tos/room_data/2-room
      eval_tasks:
        - task_type: rot
          task_kwargs: {}
      prompt_config:
        enable_think: true
